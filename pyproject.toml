[project]
name = "phosphor"
description = "WebGPU accelerated visualization of unbounded neural data streams in Python"
authors = [
  { name = "Chadwick Boulay", email = "chadwick.boulay@gmail.com" },
]
readme = "README.md"
requires-python = ">=3.11"
dynamic = ["version"]
dependencies = [
    "fastplotlib",
    "numpy>=2.4.2",
    "pyside6>=6.10.2",
]

[dependency-groups]
dev = [
  "pre-commit>=4.2.0",
  {include-group = "examples"},
  {include-group = "lint"},
  {include-group = "test"},
  {include-group = "docs"},
]
examples = [
  "pylsl"
]
lint = [
  "ruff"
]
test = [
  "pytest>=8.3.3",
]
docs = [
  "sphinx>=8.1.3",
  "pydata-sphinx-theme",
  "sphinx_autodoc_typehints>=3.0.0",
  "sphinx_copybutton",
  "myst_parser",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.hooks.vcs]
version-file = "src/phosphor/__version__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/phosphor"]

[tool.ruff]
line-length = 120
target-version = "py310"
# Exclude auto-generated files
exclude = ["*/__version__.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.isort]
known-first-party = ["ezmsg.sigproc"]
known-third-party = ["ezmsg", "ezmsg.baseproc"]

[tool.uv.sources]
fastplotlib = { git = "https://github.com/pperanich/fastplotlib.git", rev = "feature/multi-line-graphic" }
